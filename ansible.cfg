[defaults]
# インベントリのデフォルトパス
inventory = /ansible/inventory/hosts

# ロール検索パス (相対パスを先に置くことで Molecule 等の異なる文脈でも動作させる)
roles_path = ./roles:/ansible/roles

# Vault パスワードファイルは環境変数 ANSIBLE_VAULT_PASSWORD_FILE で指定する
# (CI環境では .vault_pass.txt が存在しないため ansible.cfg では指定しない)

# リモートホスト関連
remote_tmp = /tmp/.ansible/tmp
ansible_python_interpreter = /usr/bin/python3

# 表示設定
stdout_callback = default
deprecation_warnings = false
