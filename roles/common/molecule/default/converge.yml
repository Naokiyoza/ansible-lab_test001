---
# ============================================================
# converge.yml: ロールを適用するプレイブック
# Molecule の `converge` フェーズで実行される
#
# 注意: Molecule のロール自動解決のため `roles:` ディレクティブを使う
# (include_role/import_role だと roles_path の自動補正が効かない)
# ============================================================
- name: Converge
  hosts: all
  gather_facts: true
  roles:
    - role: common
