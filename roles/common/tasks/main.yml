---
# ============================================================
# common ロール: 全ノード共通の基本パッケージをインストール
# ============================================================

- name: 共通パッケージをまとめてインストールする(dnf)
  ansible.builtin.dnf:
    name: "{{ common_packages }}"
    state: present
    allowerasing: true  # AlmaLinux 9 の curl-minimal 競合対策

# ansible.builtin.rpm というモジュールは存在しないため
# package_facts を使ってインストール済みパッケージを取得する
- name: パッケージ情報を取得する
  ansible.builtin.package_facts:
    manager: rpm

- name: 期待するパッケージがインストールされているか検証する
  ansible.builtin.assert:
    that:
      - item in ansible_facts.packages
    fail_msg: "Package '{{ item }}' is not installed"
  loop: "{{ common_packages }}"
