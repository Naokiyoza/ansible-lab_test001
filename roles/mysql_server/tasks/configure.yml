---
# 2. my.cnf 配布とサービス起動・rootパスワード設定

# サービス起動「前」に my.cnf を配置することで、初期化から認証プラグインが反映される
- name: MySQL設定ファイルをテンプレートから配置する
  template:
    src: custom.cnf.j2
    dest: /etc/my.cnf.d/custom.cnf
    mode: '0644'
  notify: restart mysql

- name: MySQLサービスを起動して自動起動を有効にする
  service:
    name: mysqld
    state: started
    enabled: true

- name: MySQLの初期化完了を待つ(socketファイルの生成)
  wait_for:
    path: "{{ mysql_socket }}"
    timeout: 30

# rootパスワードの初回設定 ----------------------------------------
# AlmaLinux 9 の標準パッケージはrootが空パスワードで初期化される
# --no-defaults で /root/.my.cnf を無視して純粋な空パスワード接続を試行する
- name: root に空パスワードで接続できるか確認する
  command: mysql --no-defaults -u root -e "SELECT 1;"
  register: empty_password_check
  changed_when: false
  failed_when: false

- name: root の初期状態を表示する
  debug:
    msg: "{{ '空パスワード状態(初回)' if empty_password_check.rc == 0 else 'パスワード設定済み' }}"

- name: root パスワードを設定する(初回のみ)
  community.mysql.mysql_user:
    name: root
    host: localhost
    password: "{{ mysql_root_password }}"
    plugin: "{{ mysql_auth_plugin }}"
    login_user: root
    login_password: ""
    login_unix_socket: "{{ mysql_socket }}"
    check_implicit_admin: true
  when: empty_password_check.rc == 0

# .my.cnf 配布(以降の mysql モジュールがパスワード引数なしで認証できる) ----
- name: root の .my.cnf を作成する
  copy:
    dest: /root/.my.cnf
    mode: '0600'
    content: |
      [client]
      user=root
      password={{ mysql_root_password }}
  no_log: true
