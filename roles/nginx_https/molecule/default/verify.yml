---
# ============================================================
# verify.yml: nginx_https ロール検証
# ============================================================
- name: Verify
  hosts: all
  gather_facts: false

  tasks:
    # === パッケージインストール検証 ===
    - name: パッケージインストール状況を取得する
      ansible.builtin.package_facts:
        manager: rpm

    - name: nginx と openssl がインストールされているか
      ansible.builtin.assert:
        that:
          - "'nginx' in ansible_facts.packages"
          - "'openssl' in ansible_facts.packages"
        fail_msg: "Required packages not installed"

    # === SSL証明書ファイルの存在検証 ===
    - name: SSL証明書ファイルが存在するか
      ansible.builtin.stat:
        path: /etc/nginx/ssl/server.crt
      register: ssl_cert_stat

    - name: SSL秘密鍵ファイルが存在するか
      ansible.builtin.stat:
        path: /etc/nginx/ssl/server.key
      register: ssl_key_stat

    - name: SSL関連ファイルが揃っていることを検証する
      ansible.builtin.assert:
        that:
          - ssl_cert_stat.stat.exists
          - ssl_key_stat.stat.exists
        fail_msg: "SSL files are missing"

    # === nginxサービス起動状態の検証 ===
    - name: nginxサービスの状態を取得する
      ansible.builtin.service_facts:

    - name: nginxサービスが起動しているか検証する
      ansible.builtin.assert:
        that:
          - ansible_facts.services['nginx.service'].state == 'running'
          - ansible_facts.services['nginx.service'].status == 'enabled'
        fail_msg: "nginx service is not running or enabled"

    # === ポート443でリッスンしているか検証 ===
    - name: ポート443でリッスンしているか
      ansible.builtin.wait_for:
        port: 443
        host: 127.0.0.1
        timeout: 10

    # === HTTPS応答の検証 ===
    - name: HTTPSで200応答が返るか検証する
      ansible.builtin.uri:
        url: https://127.0.0.1/
        validate_certs: false  # 自己署名のため
        return_content: false
        status_code: 200

    # === port 80 が無効化されていることの検証 ===
    - name: port 80 がリッスンしていないことを確認する
      ansible.builtin.wait_for:
        port: 80
        host: 127.0.0.1
        timeout: 3
        state: stopped
      register: port80_check
      failed_when: false

    - name: port 80 が確実に閉じていることを検証する
      ansible.builtin.assert:
        that:
          - not port80_check.failed
        fail_msg: "port 80 is still listening (should be disabled)"
